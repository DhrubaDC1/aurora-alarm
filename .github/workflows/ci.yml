name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            libgtk-4-dev \
            libadwaita-1-dev \
            libasound2-dev \
            pkg-config \
            systemd

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Validate desktop metadata
        run: |
          mkdir -p "$HOME/.local/bin"
          install -m755 /bin/true "$HOME/.local/bin/alarm-daemon"
          desktop-file-validate dist/linux/io.codex.AuroraAlarm.desktop
          appstreamcli validate dist/linux/io.codex.AuroraAlarm.metainfo.xml
          systemd-analyze --user verify dist/systemd/aurora-alarm-daemon.service

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check dependencies and licenses
        run: cargo deny check advisories licenses bans sources
