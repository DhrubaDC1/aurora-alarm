app-id: io.codex.AuroraAlarm
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: alarm-app
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --session-bus
cleanup:
  - /include
  - "*.a"
  - /lib/pkgconfig
  - /share/pkgconfig

modules:
  - name: aurora-alarm
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo
      - cp packaging/flatpak/cargo-config.toml .cargo/config.toml
      - cargo --offline build --release --locked -p alarm-app -p alarm-daemon
      - install -Dm755 target/release/alarm-app /app/bin/alarm-app
      - install -Dm755 target/release/alarm-daemon /app/bin/alarm-daemon
      - install -Dm644 dist/linux/io.codex.AuroraAlarm.desktop /app/share/applications/io.codex.AuroraAlarm.desktop
      - install -Dm644 dist/linux/io.codex.AuroraAlarm.metainfo.xml /app/share/metainfo/io.codex.AuroraAlarm.metainfo.xml
      - install -Dm644 dist/icons/io.codex.AuroraAlarm.svg /app/share/icons/hicolor/scalable/apps/io.codex.AuroraAlarm.svg
    sources:
      - type: dir
        path: ../..
